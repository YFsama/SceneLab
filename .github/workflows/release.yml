name: Release

# Builds the SceneLab desktop clients for every supported platform.
#
# - Push a tag like `v0.1.0`  → builds installers and attaches them to a draft
#   GitHub Release for that tag.
# - Run manually (workflow_dispatch) → builds installers and uploads them as
#   downloadable workflow artifacts (no release is created).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# tauri-action needs write access to publish release assets.
permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
            label: linux-x64
          - platform: windows-latest
            args: ''
            rust-targets: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri 2 system dependencies (WebKitGTK, GTK, AppIndicator, …).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      # Builds the frontend (via beforeBuildCommand) and bundles the native app.
      # When triggered by a tag, the installers are attached to a draft Release.
      - name: Build & bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'SceneLab __VERSION__'
          releaseBody: 'Download the installer for your platform from the assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Always make the bundles available as workflow artifacts, so a manual
      # run (without a tag) still produces downloadable clients.
      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scenelab-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/**/*
            src-tauri/target/**/release/*.exe
          if-no-files-found: warn
          retention-days: 14
